services:
  migration_test_postgres:
    image: postgres:16-alpine
    container_name: nura_migration_test_postgres
    restart: "no"
    environment:
      POSTGRES_DB: nura_migration_test
      POSTGRES_USER: nura_migration_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nura_migration_test -d nura_migration_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - migration_test_network

  migration_test_capture:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    working_dir: /app
    environment:
      NURA_ALLOW_MIGRATION_TESTS: "1"
      NURA_MIGRATION_TEST_DATABASE_URL: postgresql+asyncpg://nura_migration_test@migration_test_postgres:5432/nura_migration_test
    command:
      [
        "python",
        "tests/migrations/catalog_capture.py",
        "--output",
        "/migration-output/schema-fingerprint.json",
      ]
    volumes:
      - /tmp/nura-migration-test-output:/migration-output
    depends_on:
      migration_test_postgres:
        condition: service_healthy
    networks:
      - migration_test_network

networks:
  migration_test_network:
    name: nura_migration_test_network
    internal: true
